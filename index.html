// ─── LOCAL STORAGE HOOK ───────────────────────────────────────────────────────
function useLocalStorage(key, defaultVal) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : defaultVal; }
    catch { return defaultVal; }
  });
  React.useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: "text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}



function today() {

// Build CSV string from array of flat row objects.
function buildCSV(rows) {
  if (!rows || rows.length === 0) return "";
  const cols = Object.keys(rows[0]);
  const escape = v => {
    const s = v === null || v === undefined ? "" : String(v);
    return s.includes(",") || s.includes('"') || s.includes("\n")
      ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [cols.join(","), ...rows.map(r => cols.map(c => escape(r[c])).join(","))].join("\n");
}

// Push rows to Google Sheets via Apps Script webhook.
// Uses GET + query param instead of POST to avoid CORS preflight blocking.
async function pushToSheets(webhookUrl, sheetName, rows) {
  if (!rows || rows.length === 0) return { ok: false, error: "No data to export." };
  const headers = Object.keys(rows[0]);
  const values  = rows.map(r => headers.map(h => r[h] === null || r[h] === undefined ? "" : String(r[h])));
  const payload = encodeURIComponent(JSON.stringify({ sheetName, headers, values }));
  const url     = `${webhookUrl}?payload=${payload}`;
  const res     = await fetch(url, { method: "GET" });
  if (!res.ok) return { ok: false, error: `HTTP ${res.status}` };
  const text = await res.text();
  try {
    const json = JSON.parse(text);
    return json.result === "ok" ? { ok: true } : { ok: false, error: json.error || text };
  } catch {
    return text.includes("ok") ? { ok: true } : { ok: false, error: text };
  }
}

// ── Stats helpers ──────────────────────────────────────────────────────────────
function calcStats(shots) {
  const vals = shots.filter(v => v !== null);
  if (!vals.length) return { total: 0, avg: 0, sd: 0 };
  const total = vals.reduce((s, v) => s + Math.abs(v), 0);
  const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
  const sd = vals.length > 1
    ? Math.sqrt(vals.reduce((s, v) => s + (v - avg) ** 2, 0) / vals.length)
    : 0;
  return { total, avg: +avg.toFixed(2), sd: +sd.toFixed(2) };
}

// Shot log row — shows entered shots with tap-to-remove
function ShotLog({ shots, onRemove }) {
  return (
    <div className="flex flex-wrap gap-1.5 min-h-8">
      {shots.map((v, i) => {

function StatsDisplay({ stats, biasLabel }) {
  const biasDir = stats.avg < -0.15 ? "Toe bias" : stats.avg > 0.15 ? "Heel bias" : "No bias";

    <div className="grid grid-cols-3 gap-2 mt-3">

// ─── MODULE 2: FACE DIRECTION ──────────────────────────────────────────────────
//
// Direction Zone Map (7 iron, finger-width units — Week 1 data-gathering test):
//   −4 to −1 = left of target  (negative = left bias)
//   +1 to +4 = right of target (positive = right bias)
//   NOTE: You NEVER enter "0" — record which finger zone the ball actually lands in.
//         Ignore shanks and extreme mishits (those don't reflect face direction).
//
// Calibration scoring (10 shots):
//   Total   = sum of ABSOLUTE values (best possible = 10, one finger each shot)
//   Average = signed sum ÷ 10 (negative = left bias, positive = right bias)
//   Std Dev = consistency
//
// Express Differential: hit 5 shots at +4, +2, −2, −4 targets (aligned square).
//   Score = total deviation from intended target (lower = better).
//   Repeat twice = 10 shots.
//
// Express Variability: pick 6-finger target. Hit 5 shots with varying face angles
//   (very closed → slightly closed → square → slightly open → very open).
//   Score = successful shots within target window. Repeat twice = 10 shots.

const DIR_ZONES = [
  { value: -4, label: "−4", desc: "Far Left",    colorClass: "bg-rose-900/70 border-rose-700 text-rose-300" },
  { value: -3, label: "−3", desc: "Left",         colorClass: "bg-rose-900/50 border-rose-800 text-rose-400" },
  { value: -2, label: "−2", desc: "Slight Left",  colorClass: "bg-amber-900/60 border-amber-700 text-amber-300" },
  { value: -1, label: "−1", desc: "Just Left",    colorClass: "bg-amber-900/40 border-amber-800 text-amber-400" },
  { value: 1,  label: "+1", desc: "Just Right",   colorClass: "bg-sky-900/40 border-sky-800 text-sky-400" },
  { value: 2,  label: "+2", desc: "Slight Right", colorClass: "bg-sky-900/60 border-sky-700 text-sky-300" },
  { value: 3,  label: "+3", desc: "Right",        colorClass: "bg-violet-900/50 border-violet-800 text-violet-400" },
  { value: 4,  label: "+4", desc: "Far Right",    colorClass: "bg-violet-900/70 border-violet-700 text-violet-300" },
];

function FaceDirectionModule({ openExport }) {
  const [mode, setMode] = useState("express");
  const [activeColumn, setActiveColumn] = useState("differential");
  const [level, setLevel] = useState(1);

  // Express calibration — shot-by-shot (same 3-stat system as face strike)
  const [calShots, setCalShots] = useState([]);
  const [exDiff, setExDiff] = useState(0);   // total deviation score (lower=better)
  const [exVar, setExVar] = useState(0);     // successful returns (higher=better)
  const [exSessions, setExSessions] = useState([]);

  // Level-based
  const [lvScores, setLvScores] = useState({ differential: 0, variability: 0, calibration: 0 });
  const [lvSessions, setLvSessions] = useState([]);

  const [notes, setNotes] = useState("");

  const levelData = FACE_DIRECTION_LEVELS[level - 1];
  const calStats = calcStats(calShots);
  const lvThresh = LEVEL_SUCCESS[level] || { differential: [7,10], variability: [7,10], calibration: [7,10] };
  // Reuse face strike level thresholds for level-based direction — same pass structure
  const dirLvThresh = { differential: [7,10], variability: [7,10], calibration: [7,10],
    ...( level >= 8 && { differential: [6, level===8?8:9], variability: [6,9] }) };
  const activeDirThresh = dirLvThresh[activeColumn] || [7,10];

  const colMeta = {
    differential: { label: "Differential", color: "amber",   desc: "Intentional face-angle offset" },
    variability:  { label: "Variability",  color: "emerald", desc: "Return from open/closed setup" },
    calibration:  { label: "Calibration",  color: "rose",    desc: "Week 1 direction baseline test" },
  };

  function addCalShot(val) {
    if (calShots.length < 10) setCalShots(s => [...s, val]);
  }
  function removeCalShot(idx) {
    setCalShots(s => s.filter((_, i) => i !== idx));
  }

  function logExpress() {
    setExSessions(prev => [{
      date: today(),
      diff: exDiff, varScore: exVar,
      calShots: [...calShots], calStats: { ...calStats },
      notes,
    }, ...prev]);
    setExDiff(0); setExVar(0); setCalShots([]); setNotes("");
  }

  function logLevel() {
    const passed = lvScores[activeColumn] >= activeDirThresh[0];
    setLvSessions(prev => [{
      date: today(), level, column: activeColumn,
      score: lvScores[activeColumn], total: activeDirThresh[1],
      threshold: activeDirThresh[0], passed, notes,

// ─── MODULE 3: SHOT RANDOMIZER ─────────────────────────────────────────────────
//
// Strokes Gained dispersion standards (lateral SD & depth SD in yards)
// Sourced from Shot Scope / Arccos aggregate data by distance band.
// "Hit" = result within ±1 SD both laterally and in depth.
//
//  Distance  Lateral SD   Depth SD
//  < 50y        5y          5y
//  50–99y       9y          8y
//  100–124y    14y         11y
//  125–149y    18y         14y
//  150–174y    22y         17y
//  175–199y    26y         20y
//  200–224y    30y         24y
//  225–249y    34y         27y
//  250+y        38y         30y

const SG_DISPERSIONS = [
  { maxDist: 49,  lat: 5,  dep: 5  },
  { maxDist: 99,  lat: 9,  dep: 8  },
  { maxDist: 124, lat: 14, dep: 11 },
  { maxDist: 149, lat: 18, dep: 14 },
  { maxDist: 174, lat: 22, dep: 17 },
  { maxDist: 199, lat: 26, dep: 20 },
  { maxDist: 224, lat: 30, dep: 24 },
  { maxDist: 249, lat: 34, dep: 27 },
  { maxDist: Infinity, lat: 38, dep: 30 },
];

function getDispersion(dist) {
  return SG_DISPERSIONS.find(d => dist <= d.maxDist) || SG_DISPERSIONS[SG_DISPERSIONS.length - 1];
}

// Shape outcomes — intended vs actual
const SHAPE_RESULTS = ["Draw", "Fade", "Straight", "Pull", "Slice", "Mishit"];
const SHAPE_RESULT_META = {
  Draw:    { color: "emerald", isGood: (intended) => intended === "Draw" || intended === "High Draw" || intended === "Low Draw" },
  Fade:    { color: "sky",     isGood: (intended) => intended === "Fade" || intended === "High Fade" || intended === "Low Fade" },
  Straight:{ color: "violet",  isGood: (intended) => intended === "Straight" || intended === "Punch" },
  Pull:    { color: "amber",   isGood: () => false },
  Slice:   { color: "rose",    isGood: () => false },
  Mishit:  { color: "rose",    isGood: () => false },
};

// Proximity — lateral and depth are independent axes, multi-select allowed.
// "hit" is exclusive (clears all misses). Any miss clears "hit".
// A shot can be e.g. ["left","short"] = outside window in both dimensions.
const PROX_LATERAL = [
  { value: "left",  label: "Left",  color: "amber"  },
  { value: "right", label: "Right", color: "sky"    },
];
const PROX_DEPTH = [
  { value: "short", label: "Short", color: "rose"   },
  { value: "long",  label: "Long",  color: "violet" },
];
const ALL_MISS_VALUES = ["left", "right", "short", "long"];

// Format a prox set for display in history / confirmation
function formatProx(proxSet) {
  if (!proxSet || proxSet.length === 0) return "—";
  if (proxSet.includes("hit")) return "Hit ✓";
  return proxSet.map(v => v.charAt(0).toUpperCase() + v.slice(1)).join(" + ");
}

function ShotRandomizerModule({ openExport }) {
  const [view, setView] = useState("randomize");
  const [shot, setShot] = useState(null);
  const [isSpinning, setIsSpinning] = useState(false);
  const [locked, setLocked] = useState({ shape: false, distance: false, target: false, trouble: false });
  const [pinned, setPinned] = useState({ shape: SHOT_SHAPES[0], distance: DISTANCES[5], target: TARGETS[2], trouble: TROUBLE[0] });

  const [resultShape, setResultShape] = useState(null);
  const [proxSet, setProxSet] = useState([]); // array: ["hit"] | subset of ["left","right","short","long"]
  const [actualDist, setActualDist] = useState("");
  const [resultLogged, setResultLogged] = useState(false);

  const [history, setHistory] = useState([]);

  function generateShot() {
    setIsSpinning(true);
    setResultShape(null);
    setProxSet([]);
    setActualDist("");
    setResultLogged(false);
    setTimeout(() => {
      const next = {
        shape: locked.shape ? pinned.shape : rand(SHOT_SHAPES),
        distance: locked.distance ? pinned.distance : rand(DISTANCES),
        target: locked.target ? pinned.target : rand(TARGETS),
        trouble: locked.trouble ? pinned.trouble : rand(TROUBLE),
        time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
      };
      setShot(next);
      setPinned(p => ({ ...p, ...next }));
      setIsSpinning(false);
    }, 400);
  }

  // Toggle proximity selection with mutual exclusion logic
  function toggleProx(value) {
    if (value === "hit") {
      // Hit clears all misses and is exclusive
      setProxSet(prev => prev.includes("hit") ? [] : ["hit"]);
    } else {
      // Miss clears "hit", toggles this value
      setProxSet(prev => {
        const withoutHit = prev.filter(v => v !== "hit");
        return withoutHit.includes(value)
          ? withoutHit.filter(v => v !== value)
          : [...withoutHit, value];
      });
    }
  }

  function logResult() {
    if (!shot || !resultShape || proxSet.length === 0) return;
    setHistory(h => [{
      shot: { ...shot },
      resultShape,
      proxSet: [...proxSet],
      actualDist: actualDist !== "" ? Number(actualDist) : null,
    }, ...h].slice(0, 50));
    setResultLogged(true);
  }

  // Stats
  const stats = (() => {
    if (!history.length) return null;
    const total = history.length;
    const shapeHits = history.filter(h => SHAPE_RESULT_META[h.resultShape]?.isGood(h.shot.shape)).length;
    const proxHits  = history.filter(h => h.proxSet.includes("hit")).length;
    const shapeCounts = Object.fromEntries(SHAPE_RESULTS.map(s => [s, history.filter(h => h.resultShape === s).length]));
    // Count each miss dimension independently (a shot can hit multiple)
    const missCounts = Object.fromEntries(
      [...ALL_MISS_VALUES].map(v => [v, history.filter(h => h.proxSet.includes(v)).length])
    );
    const actualDists = history.filter(h => h.actualDist !== null).map(h => h.actualDist);
    const avgActual = actualDists.length ? Math.round(actualDists.reduce((a,b) => a+b,0) / actualDists.length) : null;
    return { total, shapeHits, proxHits, shapeCounts, missCounts, avgActual };
  })();

  const disp = shot ? getDispersion(shot.distance) : null;
  const proxReady = proxSet.length > 0;
  const canLog = resultShape && proxReady;

  // Color maps
  const proxColorActive = { hit: "bg-emerald-800/80 border-emerald-500 text-emerald-200", left: "bg-amber-800/80 border-amber-500 text-amber-200", right: "bg-sky-800/80 border-sky-500 text-sky-200", short: "bg-rose-800/80 border-rose-500 text-rose-200", long: "bg-violet-800/80 border-violet-500 text-violet-200" };
  const proxColorBar   = { left: "bg-amber-700", right: "bg-sky-700", short: "bg-rose-700", long: "bg-violet-700" };
  const shapeBarColors = { emerald: "bg-emerald-700", sky: "bg-sky-700", violet: "bg-violet-700", amber: "bg-amber-700", rose: "bg-rose-700" };

  return (
    <div className="space-y-5">

      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-black text-white tracking-tight">Shot Randomizer</h2>
          <p className="text-zinc-500 text-sm mt-0.5">On-course simulation · result tracking</p>
        </div>
        <Badge color="emerald">SG Dispersions</Badge>
      </div>

      {/* View toggle */}
      <div className="grid grid-cols-2 gap-2 bg-zinc-900 p-1 rounded-xl border border-zinc-800">
        <button onClick={() => setView("randomize")}
          className={`py-2.5 rounded-lg text-sm font-bold transition-all ${view === "randomize" ? "bg-zinc-700 text-white" : "text-zinc-500 hover:text-zinc-300"}`}>
          🎲 Randomize
        </button>
        <button onClick={() => setView("stats")}
          className={`py-2.5 rounded-lg text-sm font-bold transition-all ${view === "stats" ? "bg-zinc-700 text-white" : "text-zinc-500 hover:text-zinc-300"}`}>
          📊 Stats {history.length > 0 && <span className="ml-1 text-zinc-500">({history.length})</span>}
        </button>
      </div>

      {view === "randomize" && (
        <>
          {/* Lock controls */}
          <Card>
            <SectionLabel>Lock Parameters</SectionLabel>
            <p className="text-zinc-500 text-xs mb-3">Lock any variable to hold it constant across shots</p>
            <div className="grid grid-cols-2 gap-2">
              {[
                { key: "shape",    label: "Shot Shape",     options: SHOT_SHAPES },
                { key: "distance", label: "Distance (yds)", options: DISTANCES.map(String) },
                { key: "target",   label: "Target Side",    options: TARGETS },
                { key: "trouble",  label: "Trouble Side",   options: TROUBLE },
              ].map(({ key, label, options }) => (
                <div key={key} className={`rounded-xl p-3 border transition-all ${locked[key] ? "bg-zinc-800 border-zinc-600" : "bg-zinc-900 border-zinc-800"}`}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-zinc-300 text-xs font-semibold">{label}</span>
                    <button onClick={() => setLocked(l => ({ ...l, [key]: !l[key] }))}
                      className={`text-xs px-2 py-0.5 rounded-full font-bold transition-colors ${locked[key] ? "bg-emerald-800 text-emerald-300" : "bg-zinc-700 text-zinc-400"}`}>
                      {locked[key] ? "🔒" : "🔓"}
                    </button>
                  </div>
                  {locked[key] && (
                    <select value={pinned[key]}
                      onChange={e => setPinned(p => ({ ...p, [key]: key === "distance" ? Number(e.target.value) : e.target.value }))}
                      className="w-full bg-zinc-700 border border-zinc-600 rounded-lg px-2 py-1 text-white text-xs focus:outline-none">
                      {options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  )}
                </div>
              ))}
            </div>
          </Card>

          {/* Generate button */}
          <button onClick={generateShot} disabled={isSpinning}
            className={`w-full py-5 rounded-2xl font-black text-lg tracking-wide transition-all ${
              isSpinning
                ? "bg-zinc-700 text-zinc-500 cursor-not-allowed"
                : "bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white shadow-lg shadow-emerald-900/40"
            }`}>
            {isSpinning ? "Generating…" : "🎲 Randomize Shot"}
          </button>

          {/* Shot assignment */}
          {shot && !isSpinning && (
            <Card className="border-emerald-900/40">
              <SectionLabel>Your Assignment</SectionLabel>
              <div className="grid grid-cols-2 gap-3 mt-3">
                <div className="rounded-xl bg-zinc-800 p-4 text-center">
                  <p className="text-zinc-500 text-xs mb-1">Shape</p>
                  <p className="font-black text-xl text-white">{shot.shape}</p>
                </div>
                <div className="rounded-xl bg-zinc-800 p-4 text-center">
                  <p className="text-zinc-500 text-xs mb-1">Carry Target</p>
                  <p className="text-white font-black text-xl">{shot.distance}<span className="text-zinc-400 text-sm font-normal"> yds</span></p>
                </div>
                <div className="rounded-xl bg-zinc-800 p-4 text-center">
                  <p className="text-zinc-500 text-xs mb-1">Target Side</p>
                  <p className="text-white font-black text-xl">{shot.target}</p>
                </div>
                <div className="rounded-xl bg-rose-950/40 border border-rose-900/40 p-4 text-center">
                  <p className="text-rose-400 text-xs mb-1">⚠ Trouble</p>
                  <p className="text-white font-black text-xl">{shot.trouble}</p>
                </div>
              </div>
              {disp && (
                <div className="mt-3 p-3 rounded-xl bg-zinc-800/60 border border-zinc-700/40">
                  <p className="text-zinc-400 text-xs font-semibold mb-2">SG Dispersion Window — {shot.distance}y</p>
                  <div className="grid grid-cols-2 gap-2 text-xs text-center">
                    <div>
                      <p className="text-zinc-500">Lateral (L / R)</p>
                      <p className="text-white font-bold">±{disp.lat} yds</p>
                    </div>
                    <div>
                      <p className="text-zinc-500">Depth (Short / Long)</p>
                      <p className="text-white font-bold">±{disp.dep} yds</p>
                    </div>
                  </div>
                  <p className="text-zinc-600 text-xs mt-2 text-center">"Hit" = within both windows · misses can combine (e.g. Short + Left)</p>
                </div>
              )}
            </Card>
          )}

          {/* Result entry */}
          {shot && !isSpinning && !resultLogged && (
            <Card className="border-zinc-700">
              <SectionLabel>Record Result</SectionLabel>

              {/* Shape result */}
              <div className="mt-3">
                <p className="text-zinc-400 text-xs font-semibold mb-2">Shot Shape <span className="text-zinc-600 font-normal">(what did it actually do?)</span></p>
                <div className="grid grid-cols-3 gap-1.5">
                  {SHAPE_RESULTS.map(s => {
                    const meta = SHAPE_RESULT_META[s];
                    const isSelected = resultShape === s;
                    const isGood = meta.isGood(shot.shape);
                    return (
                      <button key={s} onClick={() => setResultShape(s)}
                        className={`rounded-lg py-2.5 text-xs font-bold border transition-all ${
                          isSelected
                            ? isGood ? "bg-emerald-800/80 border-emerald-600 text-emerald-200" : "bg-rose-800/80 border-rose-600 text-rose-200"
                            : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-500"
                        }`}>
                        {s}{isGood && <span className="ml-1 text-emerald-600 text-xs">✓</span>}
                      </button>
                    );
                  })}
                </div>
                {resultShape && (
                  <p className="text-xs mt-1.5 text-center">
                    {SHAPE_RESULT_META[resultShape].isGood(shot.shape)
                      ? <span className="text-emerald-400">✓ Matched — intended {shot.shape}</span>
                      : <span className="text-rose-400">✗ Unintended — called {shot.shape}, got {resultShape}</span>}
                  </p>
                )}
              </div>

              {/* Proximity — Hit button + 2×2 miss grid */}
              <div className="mt-4">
                <p className="text-zinc-400 text-xs font-semibold mb-2">
                  Proximity <span className="text-zinc-600 font-normal">— select all that apply</span>
                </p>

                {/* Hit — full-width exclusive button */}
                <button
                  onClick={() => toggleProx("hit")}
                  className={`w-full py-2.5 rounded-lg text-sm font-bold border transition-all mb-2 ${
                    proxSet.includes("hit") ? proxColorActive.hit : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-500"
                  }`}>
                  ✓ Hit — within ±{disp?.lat}y lateral & ±{disp?.dep}y depth
                </button>

                {/* Miss axes — 2×2 layout */}
                <p className="text-zinc-600 text-xs mb-1.5 text-center">— or select one or more misses —</p>
                <div className="grid grid-cols-2 gap-2">
                  {/* Lateral row */}
                  <div className="space-y-1.5">
                    <p className="text-zinc-600 text-xs text-center">Lateral (outside ±{disp?.lat}y)</p>
                    {PROX_LATERAL.map(p => (
                      <button key={p.value} onClick={() => toggleProx(p.value)}
                        className={`w-full py-2.5 rounded-lg text-sm font-bold border transition-all ${
                          proxSet.includes(p.value) ? proxColorActive[p.value] : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-500"
                        }`}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                  {/* Depth row */}
                  <div className="space-y-1.5">
                    <p className="text-zinc-600 text-xs text-center">Depth (outside ±{disp?.dep}y)</p>
                    {PROX_DEPTH.map(p => (
                      <button key={p.value} onClick={() => toggleProx(p.value)}
                        className={`w-full py-2.5 rounded-lg text-sm font-bold border transition-all ${
                          proxSet.includes(p.value) ? proxColorActive[p.value] : "bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-zinc-500"
                        }`}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Live summary of selection */}
                {proxSet.length > 0 && (
                  <div className={`mt-2 px-3 py-2 rounded-lg text-xs font-bold text-center ${
                    proxSet.includes("hit")
                      ? "bg-emerald-900/40 border border-emerald-800/50 text-emerald-300"
                      : "bg-zinc-800 border border-zinc-700 text-zinc-300"
                  }`}>
                    {proxSet.includes("hit")
                      ? "✓ Hit — within SG dispersion window"
                      : `Miss: ${formatProx(proxSet)}`}
                  </div>
                )}
              </div>

              {/* Actual distance */}
              <div className="mt-4">
                <p className="text-zinc-400 text-xs font-semibold mb-1.5">Actual Carry Distance <span className="text-zinc-600 font-normal">(optional)</span></p>
                <div className="flex items-center gap-2">
                  <input type="number" value={actualDist} onChange={e => setActualDist(e.target.value)}
                    placeholder={`Target: ${shot.distance} yds`}
                    className="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500" />
                  <span className="text-zinc-500 text-sm">yds</span>
                  {actualDist !== "" && (
                    <span className={`text-xs font-bold tabular-nums ${Math.abs(Number(actualDist) - shot.distance) <= (disp?.dep || 15) ? "text-emerald-400" : "text-rose-400"}`}>
                      {Number(actualDist) >= shot.distance ? "+" : ""}{Number(actualDist) - shot.distance}
                    </span>
                  )}
                </div>
              </div>

              <button onClick={logResult} disabled={!canLog}
                className={`w-full mt-4 py-3 rounded-xl font-bold text-sm transition-all ${
                  canLog ? "bg-emerald-700 hover:bg-emerald-600 text-white" : "bg-zinc-800 text-zinc-600 cursor-not-allowed"
                }`}>
                {canLog ? "Log Result" : "Select shape + proximity to log"}
              </button>
            </Card>
          )}

          {/* Post-log confirmation */}
          {resultLogged && shot && (
            <Card className="border-emerald-900/40">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-emerald-400 font-bold text-sm">✓ Result logged</p>
                  <p className="text-zinc-500 text-xs mt-0.5">
                    Shape: <span className="text-white">{resultShape}</span>
                    {" · "}Proximity: <span className={proxSet.includes("hit") ? "text-emerald-400" : "text-amber-400"}>{formatProx(proxSet)}</span>
                    {actualDist !== "" && <> · <span className="text-white">{actualDist}y</span></>}
                  </p>
                </div>
                <button onClick={generateShot}
                  className="px-3 py-1.5 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-white text-xs font-bold transition-colors">
                  Next →
                </button>
              </div>
            </Card>
          )}

          {/* Shot history */}
          {history.length > 0 && (
            <Card>
              <div className="flex items-center justify-between mb-3">
                <SectionLabel>Shot Log</SectionLabel>
                <div className="flex items-center gap-2">
                  <ExportButton onClick={() => openExport(
                    history.map(h => ({
                      time: h.shot.time,
                      assigned_shape: h.shot.shape,
                      target_distance_yds: h.shot.distance,
                      target_side: h.shot.target,
                      trouble_side: h.shot.trouble,
                      result_shape: h.resultShape,
                      shape_matched: SHAPE_RESULT_META[h.resultShape]?.isGood(h.shot.shape) ? "YES" : "NO",
                      proximity: formatProx(h.proxSet),
                      proximity_hit: h.proxSet.includes("hit") ? "YES" : "NO",
                      miss_left: h.proxSet.includes("left") ? "YES" : "NO",
                      miss_right: h.proxSet.includes("right") ? "YES" : "NO",
                      miss_short: h.proxSet.includes("short") ? "YES" : "NO",
                      miss_long: h.proxSet.includes("long") ? "YES" : "NO",
                      actual_carry_yds: h.actualDist !== null ? h.actualDist : "",
                    })),
                    "Shot Randomizer"
                  )} />
                  <button onClick={() => setHistory([])} className="text-xs text-zinc-600 hover:text-zinc-400 transition-colors">Clear</button>
                </div>
              </div>
              <div className="space-y-1.5">
                {history.slice(0, 12).map((h, i) => {
                  const shapeGood = SHAPE_RESULT_META[h.resultShape]?.isGood(h.shot.shape);
                  const proxGood  = h.proxSet.includes("hit");
                  return (
                    <div key={i} className={`flex items-center justify-between py-1.5 border-b border-zinc-800/60 last:border-0 text-xs ${i === 0 ? "" : "opacity-70"}`}>
                      <div className="flex items-center gap-1.5">
                        <span className="text-zinc-600">{h.shot.time}</span>
                        <span className="text-zinc-300 font-semibold">{h.shot.shape}</span>
                        <span className="text-zinc-600">@{h.shot.distance}y</span>
                      </div>
                      <div className="flex items-center gap-1.5 flex-wrap justify-end">
                        <span className={`px-1.5 py-0.5 rounded font-bold ${shapeGood ? "bg-emerald-900/60 text-emerald-400" : "bg-rose-900/40 text-rose-400"}`}>{h.resultShape}</span>
                        <span className={`px-1.5 py-0.5 rounded font-bold ${proxGood ? "bg-emerald-900/60 text-emerald-400" : "bg-amber-900/40 text-amber-400"}`}>{formatProx(h.proxSet)}</span>
                        {h.actualDist !== null && <span className="text-zinc-500">{h.actualDist}y</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}
        </>
      )}

      {/* ── STATS VIEW ───────────────────────────────────────────────── */}
      {view === "stats" && (
        <>
          {!stats ? (
            <Card><p className="text-zinc-500 text-sm text-center py-4">No shots logged yet. Hit some balls first.</p></Card>
          ) : (
            <>
              {/* Summary */}
              <Card className="border-emerald-900/30">
                <SectionLabel>Session Summary — {stats.total} shots</SectionLabel>
                <div className="grid grid-cols-2 gap-3 mt-3">
                  <div className="rounded-xl bg-zinc-800 p-4 text-center">
                    <p className="text-zinc-500 text-xs mb-1">Shape Accuracy</p>
                    <p className={`font-black text-2xl ${stats.shapeHits/stats.total >= 0.7 ? "text-emerald-400" : stats.shapeHits/stats.total >= 0.5 ? "text-amber-400" : "text-rose-400"}`}>
                      {Math.round(stats.shapeHits / stats.total * 100)}%
                    </p>
                    <p className="text-zinc-600 text-xs mt-0.5">{stats.shapeHits}/{stats.total} intended</p>
                  </div>
                  <div className="rounded-xl bg-zinc-800 p-4 text-center">
                    <p className="text-zinc-500 text-xs mb-1">Proximity Hit %</p>
                    <p className={`font-black text-2xl ${stats.proxHits/stats.total >= 0.5 ? "text-emerald-400" : stats.proxHits/stats.total >= 0.3 ? "text-amber-400" : "text-rose-400"}`}>
                      {Math.round(stats.proxHits / stats.total * 100)}%
                    </p>
                    <p className="text-zinc-600 text-xs mt-0.5">{stats.proxHits}/{stats.total} within SG window</p>
                  </div>
                </div>
                {stats.avgActual !== null && (
                  <div className="mt-3 rounded-xl bg-zinc-800 p-3 text-center">
                    <p className="text-zinc-500 text-xs">Avg Actual Carry (recorded shots)</p>
                    <p className="text-white font-black text-xl mt-0.5">{stats.avgActual} yds</p>
                  </div>
                )}
              </Card>

              {/* Miss pattern breakdown — lateral vs depth */}
              <Card>
                <SectionLabel>Miss Pattern</SectionLabel>
                <p className="text-zinc-600 text-xs mt-0.5 mb-3">A shot can appear in multiple categories (e.g. Short + Left)</p>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <p className="text-zinc-500 text-xs font-semibold mb-2">Lateral</p>
                    {PROX_LATERAL.map(p => {
                      const count = stats.missCounts[p.value] || 0;
                      const pct = Math.round(count / stats.total * 100);
                      return (
                        <div key={p.value} className="mb-2">
                          <div className="flex justify-between text-xs mb-0.5">
                            <span className={count > 0 ? "text-zinc-200 font-semibold" : "text-zinc-600"}>{p.label}</span>
                            <span className="text-zinc-500">{count} · {pct}%</span>
                          </div>
                          <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full ${proxColorBar[p.value]}`} style={{ width: `${pct}%` }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div>
                    <p className="text-zinc-500 text-xs font-semibold mb-2">Depth</p>
                    {PROX_DEPTH.map(p => {
                      const count = stats.missCounts[p.value] || 0;
                      const pct = Math.round(count / stats.total * 100);
                      return (
                        <div key={p.value} className="mb-2">
                          <div className="flex justify-between text-xs mb-0.5">
                            <span className={count > 0 ? "text-zinc-200 font-semibold" : "text-zinc-600"}>{p.label}</span>
                            <span className="text-zinc-500">{count} · {pct}%</span>
                          </div>
                          <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full ${proxColorBar[p.value]}`} style={{ width: `${pct}%` }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="mt-3 p-2.5 rounded-lg bg-zinc-800/60 border border-zinc-700/40 text-xs text-zinc-500">
                  <span className="text-zinc-400 font-semibold">SG Standard: </span>
                  Windows scale by distance — 50y allows ±5y; 200y allows ±26y lateral / ±20y depth.
                </div>
              </Card>

              {/* Shape breakdown */}
              <Card>
                <SectionLabel>Shape Results</SectionLabel>
                <div className="mt-3 space-y-2">
                  {SHAPE_RESULTS.map(s => {
                    const count = stats.shapeCounts[s] || 0;
                    const pct = Math.round(count / stats.total * 100);
                    const meta = SHAPE_RESULT_META[s];
                    return (
                      <div key={s}>
                        <div className="flex justify-between text-xs mb-0.5">
                          <span className={count > 0 ? "text-zinc-200 font-semibold" : "text-zinc-600"}>{s}</span>
                          <span className="text-zinc-500">{count} · {pct}%</span>
                        </div>
                        <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full ${shapeBarColors[meta.color]}`} style={{ width: `${pct}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Dispersion reference */}
              <Card>
                <SectionLabel>SG Dispersion Reference</SectionLabel>
                <div className="mt-2 text-xs">
                  <div className="grid grid-cols-3 gap-x-2 text-zinc-600 font-semibold pb-1 border-b border-zinc-800">
                    <span>Distance</span><span className="text-center">Lateral ±</span><span className="text-center">Depth ±</span>
                  </div>
                  {SG_DISPERSIONS.filter(d => d.maxDist !== Infinity).map((d, i) => {
                    const prev = i === 0 ? 0 : SG_DISPERSIONS[i-1].maxDist + 1;
                    return (
                      <div key={i} className="grid grid-cols-3 gap-x-2 py-1 border-b border-zinc-800/40 last:border-0 text-zinc-400">
                        <span>{prev}–{d.maxDist}y</span><span className="text-center">{d.lat}y</span><span className="text-center">{d.dep}y</span>
                      </div>
                    );
                  })}
                  <div className="grid grid-cols-3 gap-x-2 py-1 text-zinc-400">
                    <span>250y+</span><span className="text-center">38y</span><span className="text-center">30y</span>
                  </div>
                </div>
              </Card>
            </>
          )}
        </>
      )}
    </div>
  );
}

// ─── APP SHELL ─────────────────────────────────────────────────────────────────

const TABS = [
  { id: "strike",     label: "Face Strike",  icon: "⛳" },
  { id: "direction",  label: "Direction",    icon: "🎯" },
  { id: "randomizer", label: "Randomizer",   icon: "🎲" },
  { id: "settings",   label: "Settings",     icon: "⚙" },
];

function App() {
  const [tab, setTab] = useState("strike");
  const [webhookUrl, setWebhookUrl] = useLocalStorage("webhook_url", "");

  const [sheetsToast, setSheetsToast] = useState(null); // "pushing" | "ok" | { error }

  // Central export handler — pushes to Sheets if webhook configured, else shows CSV modal
  async function openExport(rows, sheetName) {
    if (!rows || rows.length === 0) return;
    const filename = `${sheetName.replace(/\s+/g, "-").toLowerCase()}-${today()}.csv`;

    if (!webhookUrl) {
      // No webhook — download CSV directly (we're in a real browser!)
      const csv = buildCSV(rows);
      if (csv) downloadCSV(csv, filename);
      return;
    }

    // Push to Sheets
    setSheetsToast("pushing");
    try {
      const result = await pushToSheets(webhookUrl, sheetName, rows);
      setSheetsToast(result.ok ? "ok" : { error: result.error });
    } catch (e) {
      setSheetsToast({ error: e.message || "Network error" });
    }
    setTimeout(() => setSheetsToast(null), 4000);
  }

  return (
    <div className="min-h-screen bg-zinc-950 text-white" style={{ fontFamily: "'Georgia', 'Times New Roman', serif" }}>


      {sheetsToast && <SheetsToast status={sheetsToast} onClose={() => setSheetsToast(null)} />}

      {/* Top header */}
      <div className="sticky top-0 z-10 bg-zinc-950/95 backdrop-blur border-b border-zinc-800/80">
        <div className="max-w-lg mx-auto px-4 py-3">
          <div className="flex items-center justify-between mb-3">
            <div>
              <h1 className="text-lg font-black tracking-tight text-white">Golf Practice Tracker</h1>
              <p className="text-zinc-600 text-xs">
                Technical Drill Suite
                {webhookUrl && <span className="ml-2 text-emerald-600">● Sheets connected</span>}
              </p>
            </div>
            <div className="w-9 h-9 rounded-xl bg-emerald-900/60 border border-emerald-700/50 flex items-center justify-center text-lg">⛳</div>
          </div>

          {/* Tab bar */}
          <div className="grid grid-cols-4 gap-1 bg-zinc-900 p-1 rounded-xl">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`py-2 px-1 rounded-lg text-xs font-bold transition-all ${tab === t.id ? "bg-zinc-700 text-white" : "text-zinc-500 hover:text-zinc-300"}`}>
                <span className="mr-0.5">{t.icon}</span> {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="max-w-lg mx-auto px-4 py-6 pb-12">
        {tab === "strike"     && <FaceStrikeModule openExport={openExport} />}
        {tab === "direction"  && <FaceDirectionModule openExport={openExport} />}
        {tab === "randomizer" && <ShotRandomizerModule openExport={openExport} />}
        {tab === "settings"   && <SettingsTab webhookUrl={webhookUrl} setWebhookUrl={setWebhookUrl} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
